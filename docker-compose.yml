services:
  inventai-backend:
    build: ./backend
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/inventai
      - ALLOWED_ORIGINS=http://localhost:5173
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      - postgres

  inventai-frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=${VITE_API_BASE:-http://localhost:8002/api/v1}
    depends_on:
      - inventai-backend

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=inventai
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
